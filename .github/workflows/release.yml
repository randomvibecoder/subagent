name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install static toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Validate tag version
        shell: bash
        run: |
          crate_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          test "v$crate_version" = "$GITHUB_REF_NAME"
      - name: Build and verify release artifact
        run: |
          cargo build --release --locked --target x86_64-unknown-linux-musl
          built=target/x86_64-unknown-linux-musl/release/subagent
          crate_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          file "$built" | grep -Eq 'statically linked|static-pie linked'
          ! readelf -d "$built" 2>/dev/null | grep -q NEEDED
          test "$("$built" --version)" = "subagent $crate_version"
          (cd dist && sha256sum -c subagent-linux-x86_64.sha256)
          file dist/subagent-linux-x86_64 | grep -Eq 'statically linked|static-pie linked'
          ! readelf -d dist/subagent-linux-x86_64 2>/dev/null | grep -q NEEDED
          test "$(dist/subagent-linux-x86_64 --version)" = "subagent $crate_version"
          cp dist/subagent-linux-x86_64 dist/subagent-linux-x86_64.sha256 .
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              subagent-linux-x86_64 subagent-linux-x86_64.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              subagent-linux-x86_64 subagent-linux-x86_64.sha256 \
              --title "subagent $GITHUB_REF_NAME" --generate-notes
          fi
      - name: Verify latest installer
        run: |
          crate_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          expected_version="subagent $crate_version"
          install_root=$(mktemp -d)
          for attempt in 1 2 3 4 5; do
            if SUBAGENT_INSTALL_DIR="$install_root/bin" sh install.sh; then break; fi
            test "$attempt" -lt 5
            sleep 3
          done
          test "$("$install_root/bin/subagent" --version)" = "$expected_version"
