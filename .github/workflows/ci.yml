name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools python3-jsonschema
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Unit tests
        run: cargo test --locked
      - name: Web UI tests
        run: node --test tests/ui_core.test.js
      - name: Installer syntax
        run: sh -n install.sh
      - name: Build static release
        run: cargo build --release --locked --target x86_64-unknown-linux-musl
      - name: Verify static artifact
        run: |
          binary=target/x86_64-unknown-linux-musl/release/subagent
          file "$binary" | grep -Eq 'statically linked|static-pie linked'
          ! readelf -d "$binary" 2>/dev/null | grep -q NEEDED
          test "$($binary --version)" = "subagent 0.1.4"
      - name: End-to-end tests
        run: SUBAGENT_BIN="$PWD/target/x86_64-unknown-linux-musl/release/subagent" bash tests/e2e.sh
      - name: Verify tracked release artifact
        run: |
          (cd dist && sha256sum -c subagent-linux-x86_64.sha256)
          file dist/subagent-linux-x86_64 | grep -Eq 'statically linked|static-pie linked'
          test "$(dist/subagent-linux-x86_64 --version)" = "subagent 0.1.4"
